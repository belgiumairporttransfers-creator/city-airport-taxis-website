name: Bootstrap VPS Deploy Files

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment target
        required: true
        default: production
        type: choice
        options:
          - production
          - staging

env:
  DEFAULT_DEPLOY_PATH: /opt/city-airport-taxis-website

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate VPS secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          missing=0
          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_PATH; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing secret ${name} in the ${{ inputs.environment }} environment."
              missing=1
            fi
          done
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi
          echo "Bootstrap target: ${DEPLOY_PATH}"

      - name: Sync deployment infrastructure to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          fingerprint: ${{ secrets.DEPLOY_HOST_FINGERPRINT }}
          source: "docker-compose.prod.yml,deploy/docker-deploy.sh"
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Finalize bootstrap on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          fingerprint: ${{ secrets.DEPLOY_HOST_FINGERPRINT }}
          envs: DEPLOY_PATH
          script: |
            set -euo pipefail
            echo "[bootstrap] Ensuring deploy directory exists at ${DEPLOY_PATH}"
            mkdir -p "${DEPLOY_PATH}/deploy"
            chmod +x "${DEPLOY_PATH}/deploy/docker-deploy.sh"
            echo "[bootstrap] Deployment infrastructure updated"
            echo "[bootstrap] Ensure .env.production exists before running deploy"
