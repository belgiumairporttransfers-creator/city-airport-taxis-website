name: Deploy Website

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment target
        required: true
        default: production
        type: choice
        options:
          - production
          - staging
  push:
    branches: [main]
    paths-ignore:
      - "**.md"

concurrency:
  group: deploy-website-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: city-airport-taxis-website
  IMAGE: ghcr.io/${{ github.repository_owner }}/city-airport-taxis-website
  DEFAULT_DEPLOY_PATH: /opt/city-airport-taxis-website

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment files
        run: |
          set -euo pipefail
          test -f Dockerfile
          test -f docker-compose.prod.yml
          test -f deploy/docker-deploy.sh
          echo "Deployment files OK"

      - name: Validate VPS secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          missing=0
          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY GHCR_TOKEN DEPLOY_PATH; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing secret ${name} in the production environment."
              missing=1
            fi
          done
          if [ "${missing}" -ne 0 ]; then
            echo ""
            echo "Configure GitHub → Settings → Environments → production → Secrets:"
            echo "  DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, GHCR_TOKEN, DEPLOY_PATH"
            echo "  Example DEPLOY_PATH=${{ env.DEFAULT_DEPLOY_PATH }}"
            exit 1
          fi
          echo "VPS secrets configured"
          echo "Deploy path: ${DEPLOY_PATH}"

      - name: Log in to GHCR (CI)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=${{ vars.NEXT_PUBLIC_BACKEND_URL || 'https://api.city-airport-taxis.be/api' }}
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL || 'https://www.city-airport-taxis.be' }}
            NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ vars.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log image published
        run: |
          echo "Image built and pushed:"
          echo "  ${{ env.IMAGE }}:${{ github.sha }} (production deploy tag)"
          echo "  ${{ env.IMAGE }}:latest (convenience tag)"
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"

      - name: Deploy on VPS (Docker only)
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          IMAGE: ${{ env.IMAGE }}:${{ github.sha }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          fingerprint: ${{ secrets.DEPLOY_HOST_FINGERPRINT }}
          envs: GHCR_TOKEN,GHCR_USER,IMAGE,DEPLOY_PATH
          script: |
            set -euo pipefail
            echo "[ci $(date -u +%Y-%m-%dT%H:%M:%SZ)] Connecting to VPS"
            echo "[ci] Deploy path: ${DEPLOY_PATH}"
            echo "[ci] Deploy image: ${IMAGE}"
            cd "${DEPLOY_PATH}"
            chmod +x deploy/docker-deploy.sh
            ./deploy/docker-deploy.sh
            echo "[ci] Website deployment finished"
