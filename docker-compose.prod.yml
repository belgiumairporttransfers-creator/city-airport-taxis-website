services:
  website:
    image: ${IMAGE:-ghcr.io/belgiumairporttransfers-creator/city-airport-taxis-website:latest}
    pull_policy: always
    restart: unless-stopped
    stop_grace_period: 30s
    ports:
      - "127.0.0.1:${PORT:-3003}:3000"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/en"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true
    mem_limit: 768m
    cpus: 1.5
